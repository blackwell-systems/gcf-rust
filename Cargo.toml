[package]
name = "gcf"
version = "0.4.0"
edition = "2021"
description = "Rust implementation of GCF (Graph Compact Format) — token-optimized wire format for LLMs"
license = "MIT"
repository = "https://github.com/blackwell-systems/gcf-rust"
homepage = "https://gcformat.com/"
keywords = ["gcf", "llm", "mcp", "tokens", "wire-format"]
categories = ["encoding", "data-structures"]
readme = "README.md"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"
